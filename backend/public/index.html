<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <!-- Create Task -->
    <section class="card">
      <h2>Create Task</h2>
      <form id="createForm">
        <div class="form-row">
          <input type="text" id="title" placeholder="Task title" required />
          <input type="date" id="due_date" required />
          <select id="priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button type="submit">Add Task</button>
        </div>
        <p id="createMsg" class="msg"></p>
      </form>
    </section>

    <!-- Task List -->
    <section class="card">
      <div class="list-header">
        <h2>Tasks</h2>
        <div class="filters">
          <button class="filter-btn active" data-status="">All</button>
          <button class="filter-btn" data-status="pending">Pending</button>
          <button class="filter-btn" data-status="in_progress">In Progress</button>
          <button class="filter-btn" data-status="done">Done</button>
        </div>
      </div>
      <p id="listMsg" class="msg"></p>
      <div id="taskList"></div>
    </section>
  </div>

  <!-- Update Status Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3>Update Status</h3>
      <p id="modalTaskTitle"></p>
      <p class="transition-hint" id="transitionHint"></p>
      <div class="modal-actions">
        <button id="confirmUpdate">Confirm</button>
        <button id="cancelUpdate" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
